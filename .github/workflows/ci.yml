name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DOMNISTEM_BUILD_JUCE_APP=OFF
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Native tests
        run: ctest --test-dir build --output-on-failure
      - name: CLI smoke test
        run: ./build/apps/desktop/OmniStemCLI

  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite
        run: vcpkg install sqlite3:x64-windows
      - name: Configure
        run: >-
          cmake -S . -B build
          -DOMNISTEM_BUILD_JUCE_APP=OFF
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Core tests
        run: .\build\packages\core\Release\OmniStemCoreTests.exe
      - name: DAW system tests
        run: .\build\packages\core\Release\OmniStemDawTests.exe
      - name: CTest registry
        run: ctest --test-dir build -C Release --output-on-failure
      - name: CLI smoke test
        run: .\build\apps\desktop\Release\OmniStemCLI.exe

  python-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile
        run: python -m compileall services/ai-worker
      - name: Unit tests
        run: python -m unittest discover -s services/ai-worker/tests -v
      - name: Protocol smoke test
        run: echo '{"id":"ci","method":"health.check","params":{}}' | python services/ai-worker/main.py
      - name: Canonical CLI dry-run
        run: python services/ai-worker/studio_cli.py --json models --engine demucs --current-only

  python-production-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install production audio dependencies
        run: python -m pip install -r services/ai-worker/requirements-production.txt
      - name: Run worker and production audio tests
        run: python -m unittest discover -s services/ai-worker/tests -v

  python-local-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API dependencies
        run: python -m pip install -r services/ai-worker/requirements-api.txt
      - name: Compile API modules
        run: python -m compileall services/ai-worker
      - name: Run API tests
        run: python -m unittest discover -s services/ai-worker/tests -p 'test_api_app.py' -v
      - name: CLI doctor smoke test
        run: python services/ai-worker/studio_cli.py --json doctor

  juce-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.8
          path: external/JUCE
          fetch-depth: 1
      - name: Configure JUCE application
        shell: pwsh
        run: >-
          cmake -S . -B build-juce
          -DOMNISTEM_BUILD_JUCE_APP=ON
          -DOMNISTEM_ENABLE_ASIO=OFF
          -DOMNISTEM_JUCE_SOURCE_DIR="${{ github.workspace }}/external/JUCE"
          -DJUCE_BUILD_EXAMPLES=OFF
          -DJUCE_BUILD_EXTRAS=OFF
      - name: Build JUCE application
        shell: pwsh
        run: |
          cmake --build build-juce --config Release --target OmniStemStudio --parallel 2 2>&1 | Tee-Object -FilePath juce-build.log
          $code = $LASTEXITCODE
          Select-String -Path juce-build.log -Pattern "error C[0-9]+:|fatal error|FAILED:|LNK[0-9]+" | ForEach-Object { $_.Line } | Set-Content juce-errors.log
          if ($code -ne 0) { exit $code }
      - name: Upload JUCE diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juce-build-diagnostics
          path: |
            juce-errors.log
            juce-build.log
